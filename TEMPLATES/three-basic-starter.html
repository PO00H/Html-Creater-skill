<!--
  HTML Creater Template: Basic Three.js Scene
  Minimal setup with OrbitControls and responsive canvas
  Can be opened directly (double-click) - no server needed
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Three.js Scene</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    .overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: sans-serif;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <h1 class="text-2xl font-bold">Basic Three.js Scene</h1>
    <p class="text-sm opacity-70">Drag to rotate • Scroll to zoom</p>
  </div>

  <script>
  (function() {
    // ===== SETUP =====
    var canvas = document.getElementById('canvas');

    // Scene
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // Camera
    var camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 5;

    // Renderer
    var renderer = new THREE.WebGLRenderer({
      canvas: canvas,
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // ===== OBJECTS =====
    // Add a rotating cube
    var geometry = new THREE.BoxGeometry(2, 2, 2);
    var material = new THREE.MeshStandardMaterial({
      color: 0x6366f1,
      roughness: 0.3,
      metalness: 0.7
    });
    var cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Add lights
    var ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    var directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // Add particle system (optional)
    var particlesGeometry = new THREE.BufferGeometry();
    var particlesCount = 500;
    var posArray = new Float32Array(particlesCount * 3);

    for(var i = 0; i < particlesCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 20;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    var particlesMaterial = new THREE.PointsMaterial({
      size: 0.02,
      color: 0xffffff,
      transparent: true,
      opacity: 0.5
    });
    var particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);

    // ===== MOUSE INTERACTION =====
    var mouse = { x: 0, y: 0 };
    var targetRotation = { x: 0, y: 0 };
    var isDragging = false;
    var previousMouse = { x: 0, y: 0 };

    canvas.addEventListener('mousedown', function(e) {
      isDragging = true;
      previousMouse.x = e.clientX;
      previousMouse.y = e.clientY;
    });

    window.addEventListener('mouseup', function() {
      isDragging = false;
    });

    window.addEventListener('mousemove', function(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      if(isDragging) {
        var deltaX = e.clientX - previousMouse.x;
        var deltaY = e.clientY - previousMouse.y;
        targetRotation.y += deltaX * 0.01;
        targetRotation.x += deltaY * 0.01;
        previousMouse.x = e.clientX;
        previousMouse.y = e.clientY;
      }
    }, { passive: true });

    // Zoom with scroll
    window.addEventListener('wheel', function(e) {
      camera.position.z += e.deltaY * 0.01;
      camera.position.z = Math.max(2, Math.min(10, camera.position.z));
    }, { passive: true });

    // ===== ANIMATION LOOP =====
    var clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      var elapsedTime = clock.getElapsedTime();

      // Rotate cube
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;

      // Smooth camera rotation based on mouse drag
      cube.rotation.x += (targetRotation.x - cube.rotation.x) * 0.05;
      cube.rotation.y += (targetRotation.y - cube.rotation.y) * 0.05;

      // Animate particles
      particles.rotation.y = elapsedTime * 0.05;

      // Pulse effect on cube
      var scale = 1 + Math.sin(elapsedTime * 2) * 0.05;
      cube.scale.set(scale, scale, scale);

      renderer.render(scene, camera);
    }

    // ===== RESIZE HANDLER =====
    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }, { passive: true });

    // Start
    animate();

  })();
  </script>
</body>
</html>
